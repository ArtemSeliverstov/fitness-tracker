async function api(method,path,body){
  var r=await fetch('https://api.github.com/repos/'+O+'/'+R+'/'+path,{
    method:method,
    headers:{'Authorization':'token '+localStorage.getItem('ft_gh_token'),'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
    body:body?JSON.stringify(body):undefined
  });
  var j=await r.json();
  if(!r.ok) throw new Error(j.message||'HTTP '+r.status);
  return j;
}
async function deploy(){
  var t=document.getElementById('tok').value.trim();
  if(!t){lg('⚠ Enter GitHub token');return;}
  localStorage.setItem('ft_gh_token',t);
  var btn=document.getElementById('btn');
  btn.disabled=true;
  document.getElementById('log').textContent='';
  try{
    lg('Getting latest commit...');
    var ref=await api('GET','git/ref/heads/'+B);
    var sha=ref.object.sha;
    lg('Commit: '+sha.slice(0,7));
    lg('Creating blob...');
    var ib=await api('POST','git/blobs',{content:INDEX_B64,encoding:'base64'});
    lg('Blob: '+ib.sha.slice(0,7));
    lg('Creating tree...');
    var tree=await api('POST','git/trees',{base_tree:sha,tree:[{path:'index.html',mode:'100644',type:'blob',sha:ib.sha}]});
    lg('Tree: '+tree.sha.slice(0,7));
    lg('Creating commit...');
    var commit=await api('POST','git/commits',{message:'Deploy '+V,tree:tree.sha,parents:[sha]});
    lg('Commit: '+commit.sha.slice(0,7));
    lg('Updating ref...');
    await api('PATCH','git/refs/heads/'+B,{sha:commit.sha});
    lg('✅ Done! Live in ~60s at artemseliverstov.github.io/fitness-tracker','#3dd68c');
  }catch(e){
    lg('❌ '+e.message,'#f87171');
    document.getElementById('btn').disabled=false;
  }
}
